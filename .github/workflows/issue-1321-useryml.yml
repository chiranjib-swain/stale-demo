name: Stale
on:
  workflow_dispatch: {}
jobs:
  stale:
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
    - uses: chiranjib-swain/stale@force-state-reason-pr
      with:
        operations-per-run: 150
        days-before-stale: 0      # Mark stale immediately
        days-before-close: 0      # Close immediately after stale
        ascending: true
        stale-pr-message: 'This PR is stale - testing'
        close-pr-message: 'Closing stale PR - testing'
        stale-issue-message: '...'
        close-issue-message: '...'
        stale-issue-label: 'stale'
        stale-pr-label: 'stale'
        exempt-issue-labels: 'no-stale'
        exempt-pr-labels: 'no-stale'
        remove-stale-when-updated: false  # Important: set to false
        delete-branch: false              # Disable for safety during testing
        enable-statistics: true
